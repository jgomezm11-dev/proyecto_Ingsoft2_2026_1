quarkus:
  application:
    name: Gestion de clientes
    version: 1.0-SNAPSHOT

  # HTTP
  http:
    port: 8860
    host: localhost
    root-path: /
    cors: true
    cors-origins: '*'
    cors-methods: GET,POST,PUT,DELETE,OPTIONS
    cors-headers: Content-Type,Authorization,X-Requested-With

  # Base de datos - PostgreSQL (Render Cloud)
  datasource:
    db-kind: postgresql
    username: adminuser
    password: iDmChMLelRZLqMKD7jbjObl6xPMt985m
    jdbc:
      url: "jdbc:postgresql://dpg-d72u9rc2kvos7384fseg-a.oregon-postgres.render.com:5432/docentesbd_sjzw?sslmode=require"

  # Hibernate ORM
  hibernate-orm:
    database:
      generation: drop-and-create
    log:
      sql: true

  # Configuracion de Logs
  log:
    level: INFO
    console:
      enabled: true
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      dark-launch: true

    file:
      enabled: true
      path: logs/gclientes.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 5M
        max-backup-index: 5
        file-suffix: yyyy-MM-dd

  swagger-ui:
    enabled: true
    always-include: true
    path: "/swager-ui"
    title: "Gestion de clientes demo - Vinni"
    description: "API generado en Quarkus para gestion de clientes"
    version: "V1"
    contact-name: ""

mp:
  openapi:
    extensions:
      smallrye:
        info:
          title: "Gestion de clientes"
          version: "1.1.0"